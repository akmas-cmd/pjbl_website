<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - PatriotID</title>
    <link rel="stylesheet" href="Dashboard3.css">
</head>
<body>

<div class="sidebar">
    <img src="assets/logo.png" class="logo">
    <h2 class="brand">PATRIOTID</h2>

    <ul>
        <li class="active">Dashboard utama</li>
        <li>Data Pahlawan</li>
        <li>Profil</li>
        <li>Keluar</li>
    </ul>
</div>

<div class="content">
    <h1>Dashboard</h1>
    <h2 class="subtitle">Ringkasan Utama</h2>

    <div class="cards">
        <div class="card">Total Pahlawan <br> <span>50</span></div>
        <div class="card">Favorit user <br> <span>20</span></div>
        <div class="card quote">"Merdeka atau mati!"<br><small>Semangat Pahlawan Nasional</small></div>
    </div>

    <div class="user-box">
        <div class="header">User Online (3)</div>

        <div class="row"><span class="green"></span> <b>Admin Pusat</b></div>
        <div class="row"><span class="green"></span> Admin Sejarah Jakarta</div>
        <div class="row"><span class="green"></span> Petugas Arsip 002</div>
        <div class="row"><span class="red"></span> User Non-Aktif</div>
    </div>
</div>

</body>
</html>
