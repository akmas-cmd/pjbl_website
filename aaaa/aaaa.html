<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Pahlawan</title>
    <link rel="stylesheet" href="aaaa.css">
</head>
<body>

<div class="sidebar">
    <img src="assets/logo.png" class="logo">
    <h2 class="brand">PATRIOTID</h2>

    <ul>
        <li>Dashboard utama</li>
        <li class="active">Data Pahlawan</li>
        <li>Profil</li>
        <li>Keluar</li>
    </ul>
</div>

<div class="content">
    <h1>Data Pahlawan</h1>
    <h2 class="title">Daftar Pahlawan Nusantara</h2>

    <div class="table-box">

        <div class="table-header">
            <span>Data Lengkap</span>
            <button class="btn-add">Tambah Data</button>
        </div>

        <table>
            <tr>
                <th>Nama</th>
                <th>Asal</th>
                <th>Era</th>
                <th>Aksi</th>
            </tr>

            <tr>
                <td>Ir. Soekarno</td>
                <td>Jawa Timur</td>
                <td>Proklamasi</td>
                <td><button class="btn-view">Lihat</button></td>
            </tr>
        </table>

    </div>
</div>

</body>
</html>
