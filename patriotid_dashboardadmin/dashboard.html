<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PatriotID Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <img src="patriotid_logo.png">
        <h2 class="logo">PATRIOT<span>ID</span></h2>
        </div>
        <ul>
            <li>Beranda</li>
            <li>Pahlawan</li>
            <li>Tempat Bersejarah</li>
            <li>Tragedi Bersejarah</li>
        </ul>
    </div>

    <div class="main">
        <h1>Dashboard</h1>

        <!-- Card Welcome -->
        <div class="welcome-card">
            <div class="text">
                <h2>Halo George</h2>
                <p>Bagaimana harimu? <br>Ayo lanjutkan membaca</p>
                <button>Lanjut</button>
            </div>

            <div class="illustration">
                <img src="https://i.ibb.co/6D4G0C3/illustration.png" alt="ilustrasi">
            </div>
        </div>

        <!-- Favorit -->
        <div class="favorite-card">
            <h3>Favorit</h3>

            <div class="fav-item">
                <img src="https://i.ibb.co/4tT8vBp/candi.jpg" alt="">
                <span>Borobudur</span>
            </div>

            <div class="fav-item">
                <img src="https://i.ibb.co/LtM8Dkm/kartini.jpg" alt="">
                <span>Kartini</span>
            </div>

            <div class="fav-item">
                <img src="https://i.ibb.co/bQGg7fh/tamansari.jpg" alt="">
                <span>Taman Sari</span>
            </div>

            <div class="fav-item">
                <img src="https://i.ibb.co/k61qZQy/soekarno.jpg" alt="">
                <span>Ir. Soekarno</span>
            </div>
        </div>
    </div>

</body>
</html>
